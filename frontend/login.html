<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JanConnect Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
<div class="logo-section">
<img src="logo.png" class="logo">
<h1>JanConnect</h1>
<p>Smart Civic Solutions</p>
</div>

<div class="login-card">
<h2>Login</h2>
<form id="loginForm">
<label>Select Role</label>
<select id="role">
<option value="user">Citizen / User</option>
<option value="officer">Officer (Field/Ward)</option>
<option value="admin">Admin (Dept Head)</option>
</select>
<input type="email" id="email" placeholder="Enter Email" required>
<div class="password-field">
<input type="password" id="password" placeholder="Enter Password" required>
<span class="toggle-password" onclick="togglePassword('password')">👁️</span>
</div>
<button type="submit">Login</button>
</form>
<p id="message"></p>
<p>Don't have an account? <a href="role-select.html">Register here</a></p>
</div>
</div>
<script src="script.js"></script>
<script src="chatbot.js"></script>
</body>
</html>
